const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(canvas.width, canvas.height);
const pixels = imageData.data; // Array of color [R,G,B,A, R,G,B,A, ...]

function putPixel(x, y, r, g, b, a = 255) {
  const idx = (y * canvas.width + x) * 4; // หา index แรกของ pixel (x,y)
  pixels[idx] = r;
  pixels[idx + 1] = g;
  pixels[idx + 2] = b;
  pixels[idx + 3] = a;
}

function drawLine(x1, y1, x2, y2, r, g, b, a = 255) {
  const dx = Math.abs(x2 - x1);
  const dy = Math.abs(y2 - y1);

  if(dx > dy) {
    const m = (y2 - y1) / (x2 - x1);
    const c = y1 - m * x1;
    for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
      const y = Math.round(m * x + c);
      putPixel(x, y, r, g, b, a);
    }
  } else {
    const m = (x2 - x1) / (y2 - y1);
    const c = x1 - m * y1;
    for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
      const x = Math.round(m * y + c);
      putPixel(x, y, r, g, b, a);
    }
  }
}

function drawRect(x1, y1, x2, y2, r, g, b, a = 255) {
  drawLine(x1, y1, x2, y1, r, g, b, a); // Top edge
  drawLine(x2, y1, x2, y2, r, g, b, a); // Right edge
  drawLine(x2, y2, x1, y2, r, g, b, a); // Bottom edge
  drawLine(x1, y2, x1, y1, r, g, b, a); // Left edge
}

function drawRectFilled(x1, y1, x2, y2, r, g, b, a = 255) {
  for (let y = y1; y <= y2; y++) {
    for (let x = x1; x <= x2; x++) {
      putPixel(x, y, r, g, b, a);
    }
  }
}

function drawSprite24BitRotateScale(sprite, x, y, degree, scaleX, scaleY) {
  for (let j = 0; j < sprite.length; j++) {
    for (let i = 0; i < sprite[j].length; i++) {
      const color = sprite[j][i];

      // เช็คว่าพิกเซลไม่ใช่ null (ไม่โปร่งใส) จึงจะนำมาคำนวณและวาด
      if (color !== null) {
        // ถอดรหัสสี 24-bit ออกเป็นช่องสี Red, Green, Blue
        const r = (color >> 16) & 255;
        const g = (color >> 8) & 255;
        const b = color & 255;

        // คำนวณหาจุดหมุนโดยอ้างอิงจากจุดกึ่งกลางของตัว Sprite[cite: 1]
        const rad = degree * (Math.PI / 100);
        const centerX = i - sprite[j].length / 2;
        const centerY = j - sprite.length / 2;

        const x_rot = Math.round(centerX * Math.cos(rad) - centerY * Math.sin(rad));
        const y_rot = Math.round(centerX * Math.sin(rad) + centerY * Math.cos(rad));

        const x_scaled = Math.round(x_rot * scaleX);
        const y_scaled = Math.round(y_rot * scaleY);

        const x_translate = x_scaled + x;
        const y_translate = y_scaled + y;

        const width = Math.max(1, Math.ceil(Math.abs(scaleX)));
        const height = Math.max(1, Math.ceil(Math.abs(scaleY)));
        
        drawRectFilled(
          x_translate, 
          y_translate, 
          x_translate + width, 
          y_translate + height, 
          r, g, b
        );
    }
  }
}
}

window.addEventListener('keydown', (event) => {
  // 1. ควบคุมการขยับตำแหน่งด้วยปุ่มลูกศร (Arrow Keys)
  if (event.key === 'ArrowLeft') {
    spriteX -= 5;  // เดินซ้าย
  } else if (event.key === 'ArrowRight') {
    spriteX += 5;  // เดินขวา
  } else if (event.key === 'ArrowUp') {
    spriteY -= 5;  // เดินขึ้นข้างบน
  } else if (event.key === 'ArrowDown') {
    spriteY += 5;  // เดินลงข้างล่าง
  } 
  
  // 2. ควบคุมการหมุน (Rotate) ด้วยปุ่ม Q และ E
  else if (event.key === 'q' || event.key === 'Q') {
    degree += 5;   // หมุนทวนเข็มนาฬิกา
  } else if (event.key === 'e' || event.key === 'E') {
    degree -= 5;   // หมุนตามเข็มนาฬิกา
  }
  
  // 3. ควบคุมการยืด-หด แนวนอน (Scale X) ด้วยปุ่ม A และ D
  else if (event.key === 'd' || event.key === 'D') {
    scaleX += 0.2; // ขยายแนวนอน
  } else if (event.key === 'a' || event.key === 'A') {
    scaleX = Math.max(0.2, scaleX - 0.2); // หดแนวนอน
  }
  
  // 4. ควบคุมการยืด-หด แนวตั้ง (Scale Y) ด้วยปุ่ม W และ S
  else if (event.key === 'w' || event.key === 'W') {
    scaleY += 0.2; // ขยายแนวตั้ง
  } else if (event.key === 's' || event.key === 'S') {
    scaleY = Math.max(0.2, scaleY - 0.2); // หดแนวตั้ง
  }
});

  drawRectFilled(0, 0, canvas.width, canvas.height, 255, 255, 255);
  drawSprite24BitRotateScale(smileSprite24Bit32x32, spriteX, spriteY, degree, scaleX, scaleY);  
  ctx.putImageData(imageData, 0, 0);
  requestAnimationFrame(animate);
}
